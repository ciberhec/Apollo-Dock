<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apollo Dock</title>
  <link rel="stylesheet" href="dock.css" />
</head>
<body class="theme-dark mode-bubble">
  <!-- BUBBLE MODE -->
  <div id="bubble" class="bubble">
    <div class="bubble-core" id="bubbleCore">
      <span class="bubble-glyph" aria-label="Apollo Dock"></span>
    </div>
    <div class="bubble-panel" id="bubblePanel" hidden>
      <header class="panel-header">
        <span class="panel-title">Apollo Dock</span>
        <div class="panel-actions">
          <button class="icon-btn" id="bubbleSettingsBtn" title="Settings">⚙</button>
          <button class="icon-btn" id="bubbleHideBtn" title="Hide">—</button>
        </div>
      </header>
      <div class="tool-grid" id="bubbleToolGrid"></div>
    </div>
  </div>

  <!-- SIDEBAR MODE -->
  <div id="sidebar" class="sidebar" hidden>
    <header class="sidebar-header">
      <span class="sidebar-logo" aria-label="Apollo Dock"></span>
      <span class="sidebar-title">Apollo Dock</span>
      <div class="sidebar-actions">
        <button class="icon-btn" id="sidebarSettingsBtn" title="Settings">⚙</button>
        <button class="icon-btn" id="sidebarHideBtn" title="Hide">—</button>
      </div>
    </header>
    <div class="sidebar-tools" id="sidebarToolList"></div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings" class="settings" hidden>
    <header class="settings-header">
      <span>Settings</span>
      <button class="icon-btn" id="settingsCloseBtn">✕</button>
    </header>
    <section class="settings-section">
      <label class="settings-label">Display mode</label>
      <div class="seg-group" id="modeGroup">
        <button data-mode="bubble" class="seg active">Bubble</button>
        <button data-mode="sidebar" class="seg">Sidebar</button>
      </div>
    </section>
    <section class="settings-section">
      <label class="settings-label">Opacity <span id="opacityValue">100%</span></label>
      <input type="range" min="20" max="100" value="100" id="opacitySlider" />
    </section>
    <section class="settings-section">
      <label class="settings-label">Theme</label>
      <div class="seg-group" id="themeGroup">
        <button data-theme="dark" class="seg active">Dark</button>
        <button data-theme="light" class="seg">Light</button>
      </div>
    </section>
    <section class="settings-section">
      <button class="danger" id="quitBtn">Quit Apollo Dock</button>
    </section>
  </div>

  <script src="dock.js"></script>
</body>
</html>
